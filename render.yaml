# ScamShield AI — backend API + PostgreSQL on Render
# Frontend: deploy same repo to Vercel (see docs/DEPLOYMENT.md)
services:
  - type: web
    name: scamshield-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: scamshield-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  - type: pserv
    name: scamshield-db
    runtime: postgresql
    region: oregon
    plan: free
    databaseName: scamshield
    user: scamshield
