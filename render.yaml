# ScamShield AI — backend API + PostgreSQL on Render
# Frontend: deploy same repo to Vercel (see docs/DEPLOYMENT.md)
services:
  - type: web
    name: scamshield-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: scamshield-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://scamshield-api.onrender.com
      - key: NEXTAUTH_URL
        value: https://scamshield-api.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXT_PUBLIC_APP_URL
        value: https://scamsheildai-chi.vercel.app
      - key: RENDER_BACKEND_URL
        sync: false

  - type: pserv
    name: scamshield-db
    runtime: postgresql
    region: oregon
    plan: free
    databaseName: scamshield
    user: scamshield
